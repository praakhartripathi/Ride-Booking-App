spring.application.name=backend

spring.datasource.url=jdbc:mysql://mysql:3306/ride_db
spring.datasource.username=ride_user
spring.datasource.password=ride_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# JWT Configurations
# A 256-bit (32 byte) key encoded in base64. E.g. "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 1 day in ms
application.security.jwt.expiration=86400000
# 7 days in ms
application.security.jwt.refresh-token.expiration=604800000