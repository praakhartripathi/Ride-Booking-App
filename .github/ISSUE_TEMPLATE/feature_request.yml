name: Feature request
description: Propose a new feature or enhancement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or business problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior and affected modules.
    validations:
      required: true
  - type: checkboxes
    id: modules
    attributes:
      label: Modules involved
      options:
        - label: Frontend
        - label: Backend
        - label: Database
        - label: Docker / Deployment
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the minimum conditions to consider this complete.
    validations:
      required: true
